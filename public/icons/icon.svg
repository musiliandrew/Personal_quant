<svg width="512" height="512" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#0b0b0b" />
  
  <mask id="logo-mask">
    <!-- Mask background -->
    <rect width="200" height="200" fill="black" />
    
    <!-- Base Q shape -->
    <circle cx="105" cy="95" r="63" fill="white" />
    <path d="M135 125 L165 155" stroke="white" stroke-width="18" stroke-linecap="round" />
    <rect x="47" y="95" width="16" height="65" fill="white" />
    <path d="M47 95 H85 V130 H47 Z" fill="white" />
    
    <!-- Cutouts (black) -->
    <circle cx="109" cy="95" r="47" fill="black" />
    <path d="M63 103 H71 C76 103 80 112 C80 117 76 121 71 121 H63 Z" fill="black" />
    
    <!-- Add back the bars (white, clipped to inner circle) -->
    <g clip-path="url(#logo-clip)">
      <rect x="88" y="82" width="14" height="50" fill="white" rx="7" />
      <rect x="108" y="68" width="14" height="64" fill="white" rx="7" />
      <rect x="128" y="52" width="14" height="80" fill="white" rx="7" />
    </g>
  </mask>
  
  <clipPath id="logo-clip">
    <circle cx="109" cy="95" r="47" />
  </clipPath>
  
  <!-- Fill everything using the mask with white -->
  <rect width="200" height="200" fill="#ffffff" mask="url(#logo-mask)" />
</svg>
